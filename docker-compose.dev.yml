version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: airport_pooling_mongodb_dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: airport_pooling
    volumes:
      - mongodb_dev_data:/data/db
      - ./backend/scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - airport_pooling_network

  redis:
    image: redis:7-alpine
    container_name: airport_pooling_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    networks:
      - airport_pooling_network

volumes:
  mongodb_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  airport_pooling_network:
    driver: bridge
